name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt, clippy, dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Ensure clap is not in the dependency tree
        run: |
          if cargo tree | grep -i clap; then
            echo "clap must not be a proofswe dependency" >&2
            exit 1
          fi

  build-test:
    name: build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace

  release-lto:
    name: release-lto artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: proofswe-linux
            binary: target/release-lto/proofswe
          - os: macos-latest
            artifact: proofswe-macos
            binary: target/release-lto/proofswe
          - os: windows-latest
            artifact: proofswe-windows
            binary: target/release-lto/proofswe.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release-lto binary
        run: cargo build --profile release-lto

      - name: Upload release-lto artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
