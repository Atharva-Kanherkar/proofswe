name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build native npm binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms=(
            "darwin arm64"
            "darwin amd64"
            "linux arm64"
            "linux amd64"
            "windows arm64"
            "windows amd64"
          )
          for entry in "${platforms[@]}"; do
            read -r goos goarch <<<"${entry}"
            node_arch="${goarch}"
            if [[ "${goarch}" == "amd64" ]]; then
              node_arch="x64"
            fi
            node_platform="${goos}"
            suffix=""
            if [[ "${goos}" == "windows" ]]; then
              node_platform="win32"
              suffix=".exe"
            fi
            out="dist/proofswe-${node_platform}-${node_arch}${suffix}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "${out}" ./cmd/proofswe
          done

      - name: Prepare npm packages
        env:
          PROOFSWE_RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/prepare-npm-release.mjs

      - name: Smoke test npm wrapper
        run: npm test

      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for dir in npm/native/*; do
            npm publish "${dir}" --provenance --access public
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
