name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist

  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist

      - name: Prepare npm packages
        env:
          PROOFSWE_RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/prepare-npm-release.mjs

      - name: Smoke test npm wrapper
        run: npm test

      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          publish_pkg() {
            local dir="$1"
            local name version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published; skipping"
              return
            fi
            npm publish "${dir}" --provenance --access public
          }
          for dir in npm/native/*; do
            publish_pkg "${dir}"
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if npm view "proofswe@${version}" version >/dev/null 2>&1; then
            echo "proofswe@${version} already published; skipping"
            exit 0
          fi
          npm publish --provenance --access public
